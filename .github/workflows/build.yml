# CI: Build the YTLiteSkipSilence .deb on push / PR.
#
# Builds against the public iPhoneOS16.5.sdk using Theos + clang + lld.
# Produces a rootless .deb targeting arm64 (works on arm64e devices via
# MobileSubstrate's arm64e-compat shim).
name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Theos
        run: |
          brew install ldid xz make
          git clone --recursive https://github.com/theos/theos.git ~/theos
          echo "$HOME/theos/bin" >> $GITHUB_PATH

      - name: Setup Theos SDK
        run: |
          mkdir -p ~/theos/sdks
          git clone --depth 1 https://github.com/theos/sdks.git /tmp/sdks
          cp -R /tmp/sdks/iPhoneOS16.5.sdk ~/theos/sdks/

      - name: Build .deb
        env:
          THEOS: /Users/runner/theos
        run: make package FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: YTLiteSkipSilence-deb
          path: |
            packages/*.deb
            packages/*.plist

